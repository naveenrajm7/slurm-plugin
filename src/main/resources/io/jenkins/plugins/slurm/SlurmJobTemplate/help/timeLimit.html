<div>
  Maximum runtime for the SLURM job. Use standard SLURM time format.
  <br/><br/>
  Examples:
  <ul>
    <li><code>1:00:00</code> - 1 hour</li>
    <li><code>30:00</code> - 30 minutes</li>
    <li><code>2-12:00:00</code> - 2 days and 12 hours</li>
    <li><code>60</code> - 60 minutes</li>
  </ul>
</div>
