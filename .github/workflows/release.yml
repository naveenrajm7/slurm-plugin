---
name: Release

on:
  push:
    tags:
      - '[0-9]+.[0-9]+'
      - '[0-9]+.[0-9]+.[0-9]+'
  workflow_dispatch:
    inputs:
      tag:
        description: 'Existing git tag to build and publish (e.g. 1.2)'
        required: true
        type: string

permissions:
  contents: write

jobs:
  release:
    name: Build and publish HPI
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          ref: ${{ github.event_name == 'workflow_dispatch' && format('refs/tags/{0}', inputs.tag) || github.ref }}
          fetch-depth: 0

      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '21'
          cache: maven

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.x'

      - name: Build plugin
        run: mvn --batch-mode -ntp clean package

      - name: Prepare release artifact
        run: cp target/slurm.hpi "target/slurm-${{ github.event_name == 'workflow_dispatch' && inputs.tag || github.ref_name }}.hpi"

      - name: Publish GitHub release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.event_name == 'workflow_dispatch' && inputs.tag || github.ref_name }}
          files: target/slurm-*.hpi
          generate_release_notes: true
