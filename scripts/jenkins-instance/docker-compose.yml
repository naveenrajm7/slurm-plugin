services:
  jenkins:
    image: jenkins/jenkins:lts-jdk17
    container_name: slurm-jenkins
    ports:
      - "${JENKINS_HTTP_PORT:-8282}:8080"
    environment:
      JAVA_OPTS: "-Djenkins.install.runSetupWizard=false"
      JENKINS_ADMIN_ID: "${JENKINS_ADMIN_USER:-admin}"
      JENKINS_ADMIN_PASSWORD: "${JENKINS_ADMIN_PASSWORD:?Set JENKINS_ADMIN_PASSWORD}"
    volumes:
      - jenkins_home:/var/jenkins_home
    restart: unless-stopped

volumes:
  jenkins_home:
